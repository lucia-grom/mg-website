<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="t">
<title id="t">Ilustrácia ohodnotenia a obhliadky nehnuteľnosti</title>
<!-- zem -->
<line x1="130" y1="782" x2="770" y2="782" stroke="#12202B" stroke-width="5" stroke-linecap="round"/>

<!-- telo domu: ľavá svetlomodrá, pravá biela -->
<path d="M212 402 H450 V778 H212 Z" fill="#A9D9EF"/>
<path d="M450 402 H688 V778 H450 Z" fill="#FFFFFF" stroke="#E2E8EC" stroke-width="2"/>

<!-- komín -->
<rect x="586" y="178" width="52" height="130" fill="#2E6E8E"/>
<rect x="576" y="166" width="72" height="26" rx="4" fill="#2E6E8E"/>

<!-- strecha: ľavá stredná modrá, pravá tmavá -->
<path d="M170 402 L450 118 L450 168 L232 402 Z" fill="#4E93B4"/>
<path d="M450 118 L730 402 L668 402 L450 168 Z" fill="#1F3F5E"/>
<!-- plná strešná doska -->
<path d="M150 410 L450 104 L750 410 L706 410 L450 158 L194 410 Z" fill="#1F3F5E"/>
<path d="M150 410 L450 104 L450 158 L194 410 Z" fill="#4E93B4"/>

<!-- okno pod štítom -->
<rect x="412" y="252" width="88" height="74" rx="6" fill="#2E6E8E"/>
<line x1="456" y1="252" x2="456" y2="326" stroke="#FFFFFF" stroke-width="5"/>
<line x1="412" y1="289" x2="500" y2="289" stroke="#FFFFFF" stroke-width="5"/>

<!-- cenovka vľavo -->
<g transform="rotate(-6 330 590)">
  <path d="M296 500 Q330 458 364 500 " fill="none" stroke="#2E6E8E" stroke-width="7" stroke-linecap="round"/>
  <path d="M282 512 L378 512 L378 664 Q378 676 366 676 L294 676 Q282 676 282 664 Z" fill="#FFFFFF" stroke="#E2E8EC" stroke-width="2"/>
  <circle cx="330" cy="540" r="9" fill="#A9D9EF" stroke="#2E6E8E" stroke-width="4"/>
  <text x="330" y="646" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="700" fill="#4E93B4">€</text>
</g>

<!-- klipboard s checklistom vpravo -->
<rect x="474" y="446" width="196" height="288" rx="14" fill="#FFFFFF" stroke="#2E6E8E" stroke-width="7"/>
<rect x="536" y="428" width="72" height="34" rx="8" fill="#2E6E8E"/>
<rect x="556" y="416" width="32" height="18" rx="8" fill="#2E6E8E"/>
