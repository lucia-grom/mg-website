  <line x1="548" y1="502" x2="640" y2="502" stroke="#9DB1BF" stroke-width="8"/>
  <path d="M500 556 l11 11 l19 -21" fill="none" stroke="#4E93B4" stroke-width="8"/>
  <line x1="548" y1="552" x2="640" y2="552" stroke="#9DB1BF" stroke-width="8"/>
  <path d="M500 606 l11 11 l19 -21" fill="none" stroke="#4E93B4" stroke-width="8"/>
  <line x1="548" y1="602" x2="640" y2="602" stroke="#9DB1BF" stroke-width="8"/>
  <path d="M500 656 l11 11 l19 -21" fill="none" stroke="#4E93B4" stroke-width="8"/>
  <line x1="548" y1="652" x2="640" y2="652" stroke="#9DB1BF" stroke-width="8"/>
</g>

<!-- lupa cez klipboard -->
